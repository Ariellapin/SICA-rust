# Sica-rust Environment Overview

Based on the loaded memory, here is a summary of the environment and available capabilities.

## Available Skills

The backend exposes several built-in and loaded skills. Below is a list of the current tools at your disposal:

| Skill Name | Description |
| :--- | :--- |
| **run-cli** | Executes a shell command on the host. |
| **read-file** | Reads a UTF-8 file from disk (max 1 MiB). |
| **write-file** | Writes UTF-8 content to a file (creates parent dirs). |
| **skill-creator** | Authors a new markdown skill at runtime. |
| **playwright** | Browser automation via the Playwright CLI (scraping, screenshots). |
| **powershell** | Reference for PowerShell commands on Windows. |
| **run-pwsh** | Executes a PowerShell command (preferred on Windows). |

## Invocation Format

To invoke a skill, you must emit a fenced `tool_call` block containing a JSON object with the `skill` name and `args`.

### Example: Running a CLI Command

```markdown
```tool_call
{ "skill": "run-cli", "args": { "command": "cargo --version" } }
```
```

### Example: Reading a File

```markdown
```tool_call
{ "skill": "read-file", "args": { "path": "Cargo.toml" } }
```
```

## Next Steps

You can use these skills to interact with the file system, execute commands, or create new skills. How would you like to proceed?"""
