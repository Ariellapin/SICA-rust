# Sica-Rust Project Overview

**Sica-Rust** is a Rust-based desktop application architecture designed for rapid development of business logic with a native GUI frontend. It utilizes a **Backend-Frontend split**, communicating via Windows named pipes.

## 🏗 Architecture

The workspace consists of three main components:

- **Backend (`crates/backend`)**: A long-lived background process handling business logic.
  - **Hot Reload**: Supports editing code in `src/be_core/` and restarting without a full workspace rebuild.
- **Frontend (`crates/frontend`)**: A native GUI built with `egui`/`eframe`.
  - Spawns the backend, manages IPC, and provides UI controls for testing and rebuilding.
- **Protocol (`crates/protocol`)**: Shared wire types for IPC (Binary encoding via `bincode`).

## 🛠 Prerequisites

The project uses the **`x86_64-pc-windows-gnullvm`** target to avoid Visual Studio dependencies.

### Required Installations
1.  **Rustup**: Standard Rust toolchain manager.
2.  **LLVM-MinGW**: Linker and runtime DLLs.
    ```powershell
    winget install MartinStorsjo.LLVM-MinGW.UCRT
    ```

### Environment Setup
Ensure the LLVM-MinGW `bin/` directory is in your `PATH`. You can either:
- Use the provided **`run.ps1`** wrapper (recommended).
- Manually add `%USERPROFILE%\.cargo\bin` and the LLVM path to your User Environment Variables.

## 🚀 Build & Run

### Using the Wrapper (Recommended)
```powershell
# Build entire workspace
.\run.ps1 build --workspace

# Run the GUI
.\run.ps1 run -p frontend

# Run end-to-end smoke test
.\run.ps1 run -p frontend --bin smoke
```

### Using Cargo Directly
*(Requires LLVM-MinGW on PATH)*
```powershell
cargo build --workspace
cargo run -p frontend
```

## 🖥 GUI Features

The Frontend provides a development dashboard:
- **Backend Management**: Start/Stop, Rebuild, and Rebuild & Restart buttons.
- **Auto-Watch**: Automatically rebuilds and restarts the backend on file changes in `crates/backend/src/`.
- **Request Tester**: Send test requests (`Increment`, `Fib`, `Echo`) and view responses in real-time.
- **Log Panel**: Color-coded output for backend logs, build output, and IPC events.

## 📝 Development Workflow

### Editing Business Logic
Focus your edits on:
```text
crates/backend/src/be_core/
├── mod.rs
├── counter.rs
└── fib.rs
```

### Adding New Requests
1.  **Protocol**: Add variants to `Request`/`Response` in `crates/protocol/src/lib.rs`.
2.  **Dispatcher**: Handle the new variant in `crates/backend/src/dispatcher.rs`.
3.  **UI (Optional)**: Add controls in `crates/frontend/src/ui/controls.rs`.

> **Note**: Changes to the protocol require rebuilding **both** frontend and backend.

## 🔌 Wire Protocol
- **Transport**: Windows Named Pipe (`\\.\pipe\sica-rust-<fe-pid>`)
- **Framing**: Length-delimited
- **Encoding**: Bincode

