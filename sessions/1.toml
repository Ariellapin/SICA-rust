content = """
Here’s a complete, ready-to-run setup to install Playwright via `bun` and package it as a reusable **AI skill/tool**.

---

### 🔧 Step 1: Install Playwright via Bun
Run these in your terminal:
```bash
# Add Playwright as a dev dependency
bun add -D @playwright/test

# Download browser binaries (Chromium, Firefox, WebKit)
bunx playwright install
```
> ✅ `bunx` is Bun's equivalent of `npx`. Playwright will cache browsers in `~/.cache/ms-playwright`.

---

### 📦 Step 2: Create the Skill Script
Save this as `playwright-skill.mjs`:
```js
// playwright-skill.mjs
import { chromium } from '@playwright/test';
import { parseArgs } from 'node:util';
import { mkdirSync, writeFileSync } from 'node:fs';
import { join } from 'node:path';

const { values } = parseArgs({
  options: {
    url: { type: 'string', default: 'https://example.com' },
    action: { type: 'string', default: 'screenshot' },
    output: { type: 'string', default: './playwright-output' }
  }
});

mkdirSync(values.output, { recursive: true });

async function run() {
  const browser = await chromium.launch({ headless: true });
  const page = await browser.newPage();
  
  try {
    await page.goto(values.url, { waitUntil: 'networkidle', timeout: 15000 });
    
    if (values.action === 'screenshot') {
      const path = join(values.output, 'screenshot.png');
      await page.screenshot({ path });
      console.log(`✅ Screenshot saved: ${path}`);
    } 
    else if (values.action === 'extract') {
      const title = await page.title();
      const body = await page.evaluate(() => document.body.innerText.slice(0, 1000));
      const result = { url: values.url, title, preview: body };
      const path = join(values.output, 'extracted.json');
      writeFileSync(path, JSON.stringify(result, null, 2));
      console.log(`✅ Extracted data saved: ${path}`);
      console.log(result);
    } 
    else {
      console.log(`⚠️ Unknown action: ${values.action}. Use 'screenshot' or 'extract'.`);
    }
  } catch (err) {
    console.error(`❌ Error: ${err.message}`);
  } finally {
    await browser.close();
  }
}

await run();
```

---

### 🚀 Step 3: Run the Skill
```bash
# Take a screenshot
bun playwright-skill.mjs --url https://news.ycombinator.com --action screenshot

# Extract page text
bun playwright-skill.mjs --url https://example.com --action extract
```
Output will be saved in `./playwright-output/`.

---

### 🤖 Step 4: Register as an AI Skill (Function Calling)
If you're using an AI agent framework (LangChain, OpenAI Assistants, Vercel AI SDK, etc.), register this as a tool:

**OpenAI/LangChain Compatible Schema:**
```json
{
  "name": "playwright_browser_action",
  "description": "Open a URL in a headless browser, capture a screenshot, or extract visible text.",
  "parameters": {
    "type": "object",
    "properties": {
      "url": { "type": "string", "description": "Target webpage URL" },
      "action": { "type": "string", "enum": ["screenshot", "extract"], "description": "Action to perform" }
    },
    "required": ["url", "action"]
  }
}
```

**Example Agent Invocation (Node.js):**
```js
const { spawn } = require('node:child_process');

function callPlaywrightSkill(url, action) {
  return new Promise((resolve, reject) => {
    const proc = spawn('bun', ['playwright-skill.mjs', '--url', url, '--action', action]);
    let stdout = '';
    proc.stdout.on('data', d => stdout += d);
    proc.on('close', code => code === 0 ? resolve(stdout.trim()) : reject(stdout));
  });
}

// AI agent calls this when the tool is triggered
await callPlaywrightSkill('https://example.com', 'extract');
```

---

### 🔌 Next Steps / Customization
| Want to extend it? | How |
|-------------------|-----|
| **Click/scroll/fill forms** | Add `await page.click(selector)`, `await page.fill()`, etc. |
| **Return structured data** | Parse HTML with `page.evaluate()` + CSS selectors |
| **Run in CI/Agent env** | Package as a Docker container or Bun module with `bun run` |
| **Persistent memory** | Save outputs to a DB/JSONL and feed back to AI |

Tell me your exact use case (e.g., `"scrape product prices"`, `"auto-fill and submit forms"`, `"take screenshots of competitor sites"`) and I’ll generate a tailored version of this skill."""
